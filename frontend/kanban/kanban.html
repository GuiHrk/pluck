<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pluck manager</title>

<link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16x16.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="kanban.css">


</head>
<body>

<div class="app-layout">

  <aside class="sidebar"> 

    <h3 class="logo"> Pluck </h3>
    <button class="sidebar-btn active">Kanban</button>

    <button class="sidebar-btn" data-bs-toggle="offcanvas" data-bs-target="#userPanel"> Perfil</button>

    <button class="sidebar-btn" data-bs-toggle="offcanvas" data-bs-target="#groupPanel"> Grupo</button>

  </aside>


  <main class="main-content">

      <div class="topbar">

          <h2 class="fw-bold"> Kanban </h2>

          <div class="actions"> 
            <button type="button" class="btn btn-primary" id="btnCriarGrupo">Criar Grupo</button>
          
           <button type="button" class="btn btn-primary" id="btnEntrarGrupo"> Entrar em Grupo</button>
      
          </div>
      </div>


      <div class="kanban-wrapper"> 
      <div class="board">

        <div class="column" id="todo">
            <h5>To do</h5>
            <div class="tasks-container"></div>
            <button class="add-btn">+ Adicionar</button>
            </div>
            
            <div class="column" id="doing">
            <h5>Doing</h5>
            <div class="tasks-container"></div>
            <button class="add-btn">+ Adicionar</button>
            </div>
            
            <div class="column" id="done">
            <h5>Done</h5>
            <div class="tasks-container"></div>
            <button class="add-btn">+ Adicionar</button>
            </div>
    
    </div>
      </div>

    <footer class="footer">
        <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center flex-wrap">
                    <span>
                    © 2026 Pluck
                </span>
                    <a href="politicas.html">
                    Políticas de Privacidade
                </a>
                </div>
            </div>
        </footer>
  </main>

<!-- OFFCANVAS USUÁRIO -->

<div class="offcanvas offcanvas-end"
     tabindex="-1"
     id="userPanel">

    <div class="offcanvas-header">

        <h5>Meu Perfil</h5>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas">
        </button>

    </div>

    <div class="offcanvas-body">

        <div class="mb-3">

            <label class="form-label">
                Nome
            </label>

            <input type="text"
                   class="form-control"
                   id="userName"
                   disabled>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input type="email"
                   class="form-control"
                   id="userEmail"
                   disabled>

        </div>

        <button class="btn btn-danger w-100">

            Excluir Conta

        </button>

    </div>

</div>

<!-- OFFCANVAS GRUPO -->

<div class="offcanvas offcanvas-end"
     tabindex="-1"
     id="groupPanel">

    <div class="offcanvas-header">

        <h5>Grupo</h5>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas">
        </button>

    </div>

    <div class="offcanvas-body">

        <div class="mb-3">

            <label class="form-label">
                Nome do Grupo
            </label>

            <input type="text"
                   class="form-control"
                   id="groupName"
                   disabled>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Descrição
            </label>

            <textarea class="form-control"
                      id="groupDescription"
                      disabled>
            </textarea>

        </div>

        <div class="mb-4">

            <label class="form-label">
                ID do Grupo
            </label>

            <input type="text"
                   class="form-control"
                   id="groupId"
                   disabled>

        </div>

        <hr>

        <h6>Membros</h6>

        <div id="membersList">

        </div>

        <button class="btn btn-danger w-100 mt-4">

            Excluir Grupo

        </button>

    </div>

</div>


<script src="kanban.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
