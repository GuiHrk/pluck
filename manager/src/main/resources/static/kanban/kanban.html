<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container py-5">

<h2 class="mb-4 fw-bold">Kanban</h2>

<div class="board">

<div class="column">
<h5>To do</h5>

<div class="task" draggable="true">Criar layout</div>
<div class="task" draggable="true">Estudar JS</div>

<button class="add-btn">+ Adicionar</button>
</div>
<div class="column">
<h5>Doing</h5>

<div class="task" draggable="true">Desenvolvendo tela</div>

<button class="add-btn">+ Adicionar</button>
</div>
<div class="column">
<h5>Done</h5>

<div class="task done" draggable="true">Wireframe pronto</div>

<button class="add-btn">+ Adicionar</button>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
